<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Request for Proposal Form</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }

        h1 {
            color: #FFB400; /* Gold/Orange color from the image */
            margin-bottom: 5px;
        }

        fieldset {
            border: 1px solid #3366CC; /* Blue border */
            padding: 20px;
        }

        legend {
            color: #3366CC;
            font-weight: bold;
            padding: 0 5px;
        }

        .form-row {
            display: flex;
            margin-bottom: 10px;
            align-items: flex-start;
        }

        .label-cell {
            width: 100px;
            text-align: right;
            padding-right: 15px;
            font-size: 14px;
        }

        input[type="text"], 
        input[type="email"], 
        input[type="password"], 
        textarea, 
        select {
            border: 1px solid #767676;
            padding: 2px;
        }

        textarea {
            width: 250px;
            height: 150px;
            font-family: monospace;
            font-size: 12px;
        }

        .options-group {
            display: flex;
            flex-direction: column;
        }

        .inline-options label {
            margin-right: 15px;
            font-size: 14px;
        }

        button {
            margin-left: 115px;
            padding: 2px 8px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h1>How can we help?</h1>

    <form>
        <fieldset>
            <legend>Request for Proposal</legend>

            <div class="form-row">
                <div class="label-cell">Your name:</div>
                <input type="text" name="name">
            </div>

            <div class="form-row">
                <div class="label-cell">Email:</div>
                <input type="email" name="email">
            </div>

            <div class="form-row">
                <div class="label-cell">Username:</div>
                <input type="text" name="username">
            </div>

            <div class="form-row">
                <div class="label-cell">Password:</div>
                <input type="password" name="password">
            </div>

            <div class="form-row">
                <div class="label-cell">Your Business:</div>
                <textarea placeholder="Briefly describe your business in this space"></textarea>
            </div>

            <div class="form-row">
                <div class="label-cell">Company size:</div>
                <div class="options-group">
                    <label><input type="radio" name="size" value="10"> Less than 10</label>
                    <label><input type="radio" name="size" value="50"> 11 to 50</label>
                    <label><input type="radio" name="size" value="200"> 50 to 200</label>
                    <label><input type="radio" name="size" value="over"> Over 200</label>
                </div>
            </div>

            <div class="form-row">
                <div class="label-cell">Service:</div>
                <div class="inline-options">
                    <label><input type="checkbox" name="service" value="brand"> Brand Identity</label>
                    <label><input type="checkbox" name="service" value="web"> New Website</label>
                    <label><input type="checkbox" name="service" value="redesign"> Web Redesigner</label>
                </div>
            </div>

            <div class="form-row">
                <div class="label-cell">Timeline:</div>
                <select name="timeline">
                    <option value="immediately">Immediately</option>
                    <option value="1-month">Within 1 month</option>
                    <option value="3-months">Within 3 months</option>
                </select>
            </div>

            <button type="submit">Send to dev\design</button>

        </fieldset>
    </form>

</body>
</html>
